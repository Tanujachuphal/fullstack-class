<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Skill Tracker</title>

    <link rel="stylesheet" href="skill.js">
</head>
<body>

<div class="container">
    <h2> Persistent Skill Tracker</h2>

    <div class="input-box">
        <input type="text" id="skill-input" placeholder="Add a skill">
        <button id="add-btn">Add</button>
    </div>

    <br>

    <button id="clear-btn">Clear All</button>

    <ul id="skill-list"></ul>

    <p>Total Skills: <span id="skill-count"></span></p>
</div>

<script src="skill.js" defer></script>

</body>
</html>
